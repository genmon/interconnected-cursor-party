name = "cursor-party"
main = "src/index.ts"
compatibility_date = "2024-11-30"

# Durable Objects configuration
[[durable_objects.bindings]]
name = "PRESENCE_SERVER"
class_name = "PresenceServer"
script_name = "cursor-party"

# Durable Objects migrations
[[migrations]]
tag = "v1"
new_classes = ["PresenceServer"]

# Static assets configuration
[assets]
directory = "./public"
binding = "ASSETS"
# Enable SPA mode for single-page application support
not_found_handling = "single-page-application"

# Environment variables
[vars]
WEBSITES = '["https://cursor-party.genmon.workers.dev/*", "https://(www.)?interconnected.org/*"]'

# Observability
[observability]
enabled = true
